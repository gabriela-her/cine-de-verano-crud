<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine de Verano</title>
    <link rel="stylesheet" href="./src/styles.css">    
</head>

<body>

    <header class="site-header">
        <div class="header-content">
            <span class="header-icon">🎬</span>
            <h1>Cine de Verano</h1>
            <p class="header-subtitle">Tu colección de películas favoritas</p>
        </div>
    </header>

    <main class="main-content">

        <!-- Formulario -->
        <section class="form-section">
            <h2 class="form-title" id="form-title">Añadir película</h2>

            <div class="form-group">
                <label for="title">Título</label>
                <input type="text" id="title" placeholder="Ej: El padrino" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="director">Director</label>
                <input type="text" id="director" placeholder="Ej: Francis Ford Coppola" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="synopsis">Sinopsis</label>
                <textarea id="synopsis" placeholder="Describe brevemente la película..." rows="3"></textarea>
            </div>

            <div class="form-actions">
                <button id="add-btn" class="btn btn-primary">➕ Agregar película</button>
                <button id="update-btn" class="btn btn-secondary" style="display:none">💾 Guardar cambios</button>
                <button id="cancel-btn" class="btn btn-ghost" style="display:none">Cancelar</button>
            </div>

            <!-- Notificaciones (reemplaza los alert) -->
            <div id="notification" class="notification hidden"></div>
        </section>

        <!-- Lista de películas -->
        <section class="films-section">
            <div class="films-header">
                <h2>Películas <span id="film-count" class="film-count"></span></h2>
                <input type="text" id="search-input" class="search-input"
                    placeholder="🔍 Buscar por título o director...">
            </div>

            <div id="film-section" class="films-grid">
                <!-- Las tarjetas se generan aquí con JS -->
            </div>
        </section>

    </main>

    <!-- Modal de confirmación para borrar -->
    <div id="delete-modal" class="modal-overlay hidden">
        <div class="modal">
            <p>¿Seguro que quieres eliminar esta película?</p>
            <div class="modal-actions">
                <button id="confirm-delete-btn" class="btn btn-danger">Eliminar</button>
                <button id="cancel-delete-btn" class="btn btn-ghost">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module" src="./src/js/app.js"></script>
</body>

</html>
